name: build_and_deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Bun
        uses: oven-sh/setup-bun@v2

      - run: bun ci
      - run: bun dist

      - name: Upload pages archive
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: public/

      - name: Deploy to pages
        uses: actions/deploy-pages@v4.0.5
